name: Stale data reminder

on:
  schedule:
    - cron: '0 9 * * *'   # runs every day at 9 AM UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Check data freshness and manage reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const data = JSON.parse(fs.readFileSync('data.json', 'utf8'));

            if (!data.length) { console.log('data.json is empty, skipping.'); return; }

            const latest     = data.reduce((a, b) => a.date > b.date ? a : b).date;
            const latestDate = new Date(latest + 'T00:00:00Z');
            const today      = new Date();
            today.setUTCHours(0, 0, 0, 0);
            const days = Math.floor((today - latestDate) / 86400000);

            console.log(`Latest record: ${latest} (${days} days ago)`);

            const LABEL = 'stale-data';
            const TITLE = 'Health data needs updating';

            // Create label if it doesn't exist yet
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner, repo: context.repo.repo, name: LABEL
              });
            } catch {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: LABEL, color: 'e11d48',
                description: 'Reminder to export and push updated Health data'
              });
            }

            // Find any open reminder issue
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: LABEL, state: 'open'
            });

            if (days >= 7) {
              if (open.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: TITLE,
                  labels: [LABEL],
                  body: [
                    `Your step data is **${days} days old** — time to export a fresh one.`,
                    '',
                    '**Steps:**',
                    '1. Health app → profile picture → Export All Health Data → save the ZIP',
                    '2. Unzip and run:',
                    '```bash',
                    'node parse-health.js path/to/export.xml',
                    'git add data.json',
                    'git commit -m "update steps"',
                    'git push',
                    '```',
                    '',
                    '_This issue closes automatically once fresh data is pushed._',
                  ].join('\n')
                });
                console.log('Opened stale reminder issue.');
              } else {
                console.log('Reminder issue already open, skipping.');
              }
            } else {
              // Data is fresh — close any open reminders
              for (const issue of open) {
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: 'closed'
                });
                console.log(`Closed reminder issue #${issue.number} — data is fresh.`);
              }
            }
